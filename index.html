<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presentación Aesthetic</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- EFECTO ENCENDIDO -->
<div class="overlay"></div>

<div class="container">

  <h1>Presentación Profesional</h1>

  <p>
    Aquí puedes colocar una introducción potente explicando tu servicio, marca o proyecto.
  </p>

  <div class="glow-line"></div>

  <!-- IMAGENES -->
  <div class="image-row">
    <img src="img/img1.jpg" alt="">
    <img src="img/img2.jpg" alt="">
  </div>

  <div class="glow-line"></div>

  <h2>Contenido Multimedia</h2>

  <p>
    Explicación de servicios o contenido audiovisual.
  </p>

  <!-- VIDEOS -->
  <div class="video-row">
    <iframe src="https://www.youtube.com/embed/ScMzIvxBSi4" allowfullscreen></iframe>
    <iframe src="https://www.youtube.com/embed/tgbNymZ7vqY" allowfullscreen></iframe>
    <iframe src="https://www.youtube.com/embed/kJQP7kiw5Fk" allowfullscreen></iframe>
    <iframe src="https://www.youtube.com/embed/3JZ_D3ELwOQ" allowfullscreen></iframe>
  </div>

  <div class="glow-line"></div>

  <!-- IMAGEN FINAL -->
  <div class="final-image">
    <img src="img/final.jpg" alt="">
  </div>

</div>

<script src="js/script.js"></script>
</body>
</html>
